name: Antonio Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: read
    env:
      # Opt into Node.js 24 for deprecated actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      matrix:
        api-level: [29]

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Setup JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # 3️⃣ Setup Gradle CLI
      - name: Setup Gradle CLI
        uses: gradle/actions/setup-gradle@v4

      # 4️⃣ Repair Gradle Wrapper (upgrade to 8.11.1 for AGP 9.1)
      - name: Repair Gradle Wrapper
        run: |
          if [ ! -f "gradlew" ] || [ ! -f "gradle/wrapper/gradle-wrapper.jar" ] || [ ! -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "Gradle wrapper missing or broken. Regenerating..."
            gradle wrapper --gradle-version 8.11.1 --distribution-type all
          else
            # Force upgrade if older version
            CURRENT_VERSION=$(./gradlew --version | grep "Gradle " | awk '{print $2}')
            echo "Current Gradle version: $CURRENT_VERSION"
            if [ "$(printf '%s\n' "8.11.1" "$CURRENT_VERSION" | sort -V | head -n1)" != "8.11.1" ]; then
              echo "Upgrading Gradle wrapper to 8.11.1"
              gradle wrapper --gradle-version 8.11.1 --distribution-type all
            fi
          fi

      # 5️⃣ Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          api-level: ${{ matrix.api-level }}
          build-tools: '36.0.0'
          ndk: '25.2.9519653'

      # 6️⃣ Make gradlew executable
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 7️⃣ Run Unit tests
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # 8️⃣ Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 9️⃣ Conditional Emulator smoke test
      - name: Run emulator smoke test (if enabled)
        run: |
          EMULATOR_FLAG=$(cat ci-emulator-run.txt 2>/dev/null || echo false)
          echo "Emulator run flag: $EMULATOR_FLAG"
          if [ "$EMULATOR_FLAG" = "true" ]; then
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb logcat -c
            adb shell monkey -p com.moweapp.antonio -c android.intent.category.LAUNCHER 1
            sleep 10
            echo "========== FULL LOGCAT =========="
            adb logcat -d
            echo "========== CRASH ONLY =========="
            adb logcat -d | grep -E "FATAL|AndroidRuntime|Exception|com.moweapp.antonio"
            adb shell pidof com.moweapp.antonio || exit 1
          else
            echo "Skipping emulator smoke test."
          fi

      # 🔟 Decode release keystore
      - name: Decode Master Keystore
        run: |
          mkdir -p app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/antonio-release.jks

      # 1️⃣1️⃣ Build Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          RELEASE_STORE_FILE: "antonio-release.jks"
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: "antonio-key"
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      # 1️⃣2️⃣ Upload artifacts
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Antonio-App-Build-${{ github.run_number }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/mapping/release