name: Antonio Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1️⃣ Checkout project
      - uses: actions/checkout@v4

      # 2️⃣ Set up JDK 21 (Best for modern Android)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3️⃣ Cache Gradle (Saves 2-3 minutes per build)
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # 4️⃣ Fix Permissions
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5️⃣ Build Release APK
      # NOTE: We skip the "Decode" step because you pushed the .jks file manually.
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          # This points to the file inside your 'app' folder in the repo
          RELEASE_STORE_FILE: app/antonio-release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      # 6️⃣ Upload the finished APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Antonio-App-Build-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
