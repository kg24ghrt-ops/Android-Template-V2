name: Antonio Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v4

      # 2️⃣ Set up JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3️⃣ Install Gradle CLI for repair (temporary)
      - name: Install Gradle CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      # 4️⃣ Validate or Repair Gradle Wrapper
      - name: Validate or Repair Gradle Wrapper
        run: |
          echo "Checking Gradle wrapper..."
          NEED_REPAIR=false
          if [ ! -f "gradlew" ]; then
            echo "Missing gradlew"
            NEED_REPAIR=true
          fi
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Missing wrapper jar"
            NEED_REPAIR=true
          fi
          if [ ! -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "Missing wrapper properties"
            NEED_REPAIR=true
          fi

          if [ "$NEED_REPAIR" = true ]; then
            echo "Repairing Gradle wrapper..."
            rm -rf gradlew gradlew.bat gradle/wrapper
            gradle wrapper --gradle-version 8.10.2
          else
            echo "Wrapper is valid, skipping repair"
          fi

          chmod +x gradlew

      # 5️⃣ Upload Gradle Wrapper files for mobile usage
      - name: Upload Gradle Wrapper Files
        uses: actions/upload-artifact@v4
        with:
          name: gradle-wrapper-files-${{ github.run_number }}
          path: |
            gradlew
            gradlew.bat
            gradle/wrapper/gradle-wrapper.jar
            gradle/wrapper/gradle-wrapper.properties

      # 6️⃣ Decode Master Keystore
      - name: Decode Master Keystore
        run: |
          mkdir -p app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/antonio-release.jks

      # 7️⃣ Autowire SweetDependency plugins (fixes build issues)
      - name: Autowire SweetDependency Plugins
        run: ./gradlew autowirePlugins

      # 8️⃣ Build Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --build-cache
        env:
          RELEASE_STORE_FILE: app/antonio-release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      # 9️⃣ Upload APK artifacts
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Antonio-App-Build-${{ github.run_number }}
          path: app/build/outputs/**/*.apk