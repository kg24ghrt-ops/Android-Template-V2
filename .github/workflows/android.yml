name: Antonio Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read

    strategy:
      matrix:
        api-level: [29]

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Repair Gradle Wrapper if missing or invalid
      - name: Repair Gradle Wrapper
        run: |
          GRADLE_WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          GRADLE_WRAPPER_PROPERTIES="gradle/wrapper/gradle-wrapper.properties"
          GRADLE_DIST_URL="https://services.gradle.org/distributions/gradle-8.10.2-bin.zip"

          if [ ! -f "$GRADLE_WRAPPER_JAR" ] || [ ! -f "$GRADLE_WRAPPER_PROPERTIES" ]; then
            echo "Gradle wrapper missing or incomplete. Repairing..."
            mkdir -p gradle/wrapper
            curl -s -o gradle/wrapper/gradle-wrapper.jar "$GRADLE_DIST_URL"
            cat > "$GRADLE_WRAPPER_PROPERTIES" <<EOL
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
distributionUrl=$GRADLE_DIST_URL
EOL
          else
            echo "Gradle wrapper exists, skipping repair."
          fi

      # 3️⃣ Setup JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # 4️⃣ Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 5️⃣ Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 6️⃣ Make gradlew executable
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 7️⃣ Run unit tests (fast check for logic errors)
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # 8️⃣ Build Debug APK (catch early build errors)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 9️⃣ Emulator smoke test (quick app launch check)
      - name: Run emulator smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            adb shell am start -n com.moweapp.antonio/.ui.MainActivity
            sleep 10
            adb shell pidof com.moweapp.antonio || exit 1

      # 🔟 Decode release keystore from secret
      - name: Decode Master Keystore
        run: |
          mkdir -p app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/antonio-release.jks

      # 1️⃣1️⃣ Build Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          RELEASE_STORE_FILE: "antonio-release.jks"
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: "antonio-key"
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      # 1️⃣2️⃣ Upload APK + mapping files
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Antonio-App-Build-${{ github.run_number }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/mapping/release/