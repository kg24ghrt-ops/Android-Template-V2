name: Antonio Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Install Gradle CLI (IMPORTANT for wrapper regeneration)
      - name: Install Gradle CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      # 🔥 FORCE REGENERATE WRAPPER + UPDATE PROPERTIES
      - name: Regenerate Gradle Wrapper (Full Reset)
        run: |
          echo "Forcing fresh Gradle wrapper generation..."

          # Remove old wrapper completely
          rm -rf gradlew gradlew.bat gradle/wrapper

          # Generate new wrapper with specific version
          gradle wrapper --gradle-version 8.10.2

          # Ensure executable
          chmod +x gradlew

          echo "Wrapper regenerated successfully"

      # 📦 Upload wrapper files so you can download on mobile
      - name: Upload Gradle Wrapper Files
        uses: actions/upload-artifact@v4
        with:
          name: gradle-wrapper-files-${{ github.run_number }}
          path: |
            gradlew
            gradlew.bat
            gradle/wrapper/gradle-wrapper.jar
            gradle/wrapper/gradle-wrapper.properties

      - name: Decode Master Keystore
        run: |
          mkdir -p app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/antonio-release.jks

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --build-cache
        env:
          RELEASE_STORE_FILE: app/antonio-release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Antonio-App-Build-${{ github.run_number }}
          path: app/build/outputs/**/*.apk